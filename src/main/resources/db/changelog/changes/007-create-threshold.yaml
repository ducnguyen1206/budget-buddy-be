databaseChangeLog:
  - objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
  - changeSet:
      id: 014-create-threshold
      author: cascade
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: threshold
      changes:
        - createTable:
            tableName: threshold
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: category_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_threshold_category
                    references: category(id)
              - column:
                  name: threshold
                  type: decimal(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: varchar(3)
                  constraints:
                    nullable: false
              - column:
                  name: created_date
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: last_modified_date
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: last_modified_by
                  type: varchar(255)
        - createIndex:
            indexName: idx_threshold_user_id
            tableName: threshold
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_threshold_category_id
            tableName: threshold
            columns:
              - column:
                  name: category_id
        - addUniqueConstraint:
            tableName: threshold
            columnNames: user_id, category_id
            constraintName: uk_threshold_user_category
